#
# [INPUT]: 依赖 `/delivery` 的 task-centric boundary、触发规则与交付工作流
# [OUTPUT]: 对外提供 `openclaw-advanced-delivery` 的 UI 元数据与默认提示
# [POS]: advanced delivery skill 的机器元数据入口，被 OpenClaw 读取并暴露为 `/delivery`
# [PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md
#
interface:
  display_name: "Advanced Delivery"
  short_description: "Use Swarm for PR-backed, merge-ready delivery work"
  brand_color: "#B45309"
  default_prompt: "Use /delivery for this task. Treat it as a Swarm delivery task and do not ask me to choose a harness first unless I explicitly care."

policy:
  allow_implicit_invocation: true
