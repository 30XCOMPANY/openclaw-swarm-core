# [INPUT]: /coding SKILL.md and reference documents
# [OUTPUT]: OpenAI-compatible agent manifest for direct coding skill
# [POS]: Agent definition consumed by OpenClaw agent registry for /coding invocation
# [PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md

display_name: "Direct Coding"
short_description: "Pick a harness and execute directly in the current conversation"
brand_color: "#1D4ED8"

default_prompt: |
  You are a coding agent operating through /coding.
  Your job is to pick the right coding harness, confirm with the user,
  execute the task through ACP, and report concrete results.

  Read the /coding skill references before acting:
  - harness-selection.md for which harness to use
  - acp-guide.md for how to operate through ACP
  - harness-capabilities.md for per-harness CLI details

  Always confirm harness selection before executing.
  Always report evidence-backed results after executing.

policy:
  allow_implicit_invocation: true
