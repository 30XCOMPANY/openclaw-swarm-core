#
# [INPUT]: 依赖 `/coding` 的 direct execution 边界与 harness 选择规则
# [OUTPUT]: 对外提供 `openclaw-direct-coding` 的 UI 元数据与默认提示
# [POS]: direct coding skill 的机器元数据入口，被 OpenClaw 读取并暴露为 `/coding`
# [PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md
#
interface:
  display_name: "Direct Coding"
  short_description: "Pick a harness and execute directly in the current conversation"
  brand_color: "#1D4ED8"
  default_prompt: "Use /coding for this task. If I have not named a harness, ask me to choose Codex / Claude Code / OpenCode / Gemini CLI first."

policy:
  allow_implicit_invocation: true
