#
# [INPUT]: 依赖 `/swarm` 的 task-control 边界、命令速查与状态语义
# [OUTPUT]: 对外提供 `swarm-task-control` 的 UI 元数据与默认提示
# [POS]: Swarm task control skill 的机器元数据入口，被 OpenClaw 读取并暴露为 `/swarm`
# [PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md
#
interface:
  display_name: "Swarm Task Control"
  short_description: "Inspect and control tasks already running in Swarm"
  brand_color: "#475569"
  default_prompt: "Use /swarm to inspect or control an existing Swarm delivery task. Read status first and use monitor when retry progression is needed."

policy:
  allow_implicit_invocation: true
